<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление офферами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Система управления офферами</h1>
            <p class="subtitle">Управление вакансиями и предложениями о работе</p>
        </header>

        <div class="add-offer-section">
            <h2>Добавить новый оффер</h2>
            <form id="offerForm">
                <div class="form-group">
                    <label for="title">Название:</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="company">Компания:</label>
                    <input type="text" id="company" required>
                </div>
                <div class="form-group">
                    <label for="price">Зарплата:</label>
                    <input type="number" id="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="description">Описание:</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Добавить оффер</button>
            </form>
        </div>

        <div class="offers-section">
            <h2>Текущие офферы</h2>
            <div id="offersContainer">
                <p class="loading">Загрузка офферов...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
