services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app-network
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      DB_HOST: db
      DB_PORT: 5432
    networks:
      - app-network
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      BACKEND_URL: http://backend:5000
    ports:
      - 8080:8080
    networks:
      - app-network
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
